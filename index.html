<!DOCTYPE html>
<html class="dark" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>حكاية فرح ديزاين - 3D Kosha Studio</title>
<script>window.tailwind = window.tailwind || {};</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<style>
  body { font-family:'Plus Jakarta Sans',sans-serif; overflow:hidden; background:#0e0e13; }
  .glass-panel { background:rgba(31,31,37,0.7); border:1px solid rgba(77,70,55,0.3); backdrop-filter:blur(16px); }
  input[type=range] { -webkit-appearance:none; background:transparent; }
  input[type=range]::-webkit-slider-runnable-track { height:2px; background:#4d4637; border-radius:1px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; height:14px; width:14px; border-radius:50%; background:#e4e1e9; border:1px solid #e6c364; margin-top:-6px; cursor:pointer; box-shadow:0 0 10px rgba(230,195,100,.3); }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; }
  .custom-scrollbar::-webkit-scrollbar { width:4px; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background:#4d4637; border-radius:10px; }
  .tone-swatch.active { outline:2px solid #e6c364; outline-offset:2px; }
  #webgl { display:block; width:100%; height:100%; }
  .loading-pulse { animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
</style>
<script id="tailwind-config">
  if (window.tailwind) {
  tailwind.config = { darkMode:"class", theme:{ extend:{ colors:{
    "surface-container-lowest":"#0e0e13","background":"#131318","secondary-container":"#753348",
    "on-primary-container":"#503d00","on-surface":"#e4e1e9","error":"#ffb4ab","surface-variant":"#35343a",
    "on-background":"#e4e1e9","surface-tint":"#e6c364","outline-variant":"#4d4637","on-primary":"#3d2e00",
    "surface-container":"#1f1f25","secondary":"#ffb1c4","surface-container-low":"#1b1b20",
    "surface-container-high":"#2a292f","surface":"#131318","surface-dim":"#131318","primary-container":"#c9a84c",
    "primary":"#e6c364","outline":"#99907e","on-surface-variant":"#d0c5b2","surface-container-highest":"#35343a",
    "surface-bright":"#39383e","error-container":"#93000a","on-error-container":"#ffdad6" },
    borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px"},
    spacing:{"margin-edge":"24px","gutter":"20px","base-unit":"8px","touch-target-min":"48px"},
    fontFamily:{"body-md":["Plus Jakarta Sans"],"headline-md":["Plus Jakarta Sans"],"label-caps":["Plus Jakarta Sans"],"display-lg-mobile":["Plus Jakarta Sans"]},
    fontSize:{"headline-md":["20px",{lineHeight:"28px",fontWeight:"600"}],"label-caps":["12px",{lineHeight:"16px",letterSpacing:"0.1em",fontWeight:"700"}],"display-lg-mobile":["26px",{lineHeight:"32px",fontWeight:"700"}],"body-md":["15px",{lineHeight:"22px"}]}
  }}};
  }
</script>
</head>
<body class="dark overflow-hidden h-screen w-screen flex flex-col">

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-edge h-touch-target-min bg-surface/90 backdrop-blur-2xl border-b border-outline-variant/20">
  <div class="flex items-center gap-base-unit">
    <span class="text-display-lg-mobile font-bold tracking-tight text-primary">حكاية فرح ديزاين</span>
    <div class="hidden md:flex gap-6 mr-6">
      <button class="font-label-caps text-label-caps text-primary border-b border-primary pb-0.5 tracking-widest">PLANNER</button>
      <button class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors tracking-widest">CATALOG</button>
      <button class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors tracking-widest">ARCHITECT AI</button>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <div class="flex p-0.5 bg-surface-container rounded-full border border-outline-variant/20">
      <button class="px-4 py-1 rounded-full font-label-caps text-[10px] transition-all text-on-surface-variant" id="clientToggle" onclick="toggleMode('client')">CLIENT</button>
      <button class="px-4 py-1 rounded-full font-label-caps text-[10px] bg-primary text-on-primary shadow-sm transition-all" id="adminToggle" onclick="toggleMode('admin')">ARCHITECT</button>
    </div>
  </div>
</header>

<main class="flex-1 flex pt-touch-target-min pb-8 overflow-hidden relative">
  <aside class="fixed right-0 top-0 h-full flex flex-col p-gutter z-40 bg-surface-container/60 backdrop-blur-xl border-l border-outline-variant/10 w-[280px] transition-all duration-500 translate-y-[48px]" id="sidebar">
    <div class="mb-6 mt-2">
      <h2 class="font-headline-md text-primary tracking-wide">لوحة التصميم</h2>
      <p class="font-label-caps text-[10px] text-on-surface-variant/60 tracking-[0.2em] mt-1 uppercase">Design Console</p>
    </div>
    <div class="space-y-7 flex-1 overflow-y-auto pl-2 custom-scrollbar" id="technicalControls">
      <div>
        <label class="font-label-caps text-[10px] text-on-surface-variant/80 block mb-4 tracking-widest">الألوان · TONES</label>
        <div class="flex gap-3" id="tones">
          <div data-color="#e6c364" class="tone-swatch w-8 h-8 rounded-full bg-[#e6c364] cursor-pointer active" onclick="setTone(this,'#e6c364')"></div>
          <div data-color="#f2f0ea" class="tone-swatch w-8 h-8 rounded-full bg-[#f2f0ea] cursor-pointer" onclick="setTone(this,'#f2f0ea')"></div>
          <div data-color="#c4748a" class="tone-swatch w-8 h-8 rounded-full bg-[#c4748a] cursor-pointer" onclick="setTone(this,'#c4748a')"></div>
          <div data-color="#8b7ec8" class="tone-swatch w-8 h-8 rounded-full bg-[#8b7ec8] cursor-pointer" onclick="setTone(this,'#8b7ec8')"></div>
        </div>
      </div>
      <div>
        <div class="flex justify-between mb-2"><label class="font-label-caps text-[10px] text-on-surface-variant tracking-widest">قطر المنصة · STAGE</label><span class="text-primary font-label-caps text-[10px]" id="stageVal">8.0m</span></div>
        <input id="stageSlider" class="w-full" max="14" min="5" step="0.5" type="range" value="8" oninput="onStage(this.value)"/>
      </div>
      <div>
        <div class="flex justify-between mb-2"><label class="font-label-caps text-[10px] text-on-surface-variant tracking-widest">الكراسي · CHAIRS</label><span class="text-primary font-label-caps text-[10px]" id="chairVal">24</span></div>
        <input id="chairSlider" class="w-full" max="60" min="0" step="2" type="range" value="24" oninput="onChairs(this.value)"/>
      </div>
      <div>
        <div class="flex justify-between mb-2"><label class="font-label-caps text-[10px] text-on-surface-variant tracking-widest">الورود · FLOWERS</label><span class="text-primary font-label-caps text-[10px]" id="flowerVal">Full</span></div>
        <input id="flowerSlider" class="w-full" max="100" min="0" step="5" type="range" value="100" oninput="onFlowers(this.value)"/>
      </div>
      <div>
        <div class="flex justify-between mb-2"><label class="font-label-caps text-[10px] text-on-surface-variant tracking-widest">الإضاءة · LIGHTING</label><span class="text-primary font-label-caps text-[10px]" id="lightVal">Warm</span></div>
        <input id="lightSlider" class="w-full" max="100" min="10" step="5" type="range" value="65" oninput="onLight(this.value)"/>
      </div>
      <div>
        <label class="font-label-caps text-[10px] text-on-surface-variant block mb-3 tracking-widest">الأرضية · FLOOR</label>
        <select id="floorSelect" onchange="onFloor(this.value)" class="w-full bg-surface-variant/30 border border-outline-variant/20 rounded-lg p-2.5 text-on-surface text-sm appearance-none outline-none focus:border-primary/50 transition-colors">
          <option value="marble">رخام لامع · Polished Marble</option>
          <option value="gold">ذهبي · Gold Mirror</option>
          <option value="dark">داكن · Dark Glass</option>
        </select>
      </div>
      <div class="pt-2 space-y-3">
        <button onclick="randomize()" class="w-full py-3 rounded-lg bg-primary text-on-primary font-bold text-[12px] tracking-widest hover:brightness-110 active:scale-[0.98] transition-all uppercase">تصميم جديد · New Design</button>
        <button onclick="resetView()" class="w-full py-2.5 border border-outline-variant/20 rounded-lg text-on-surface-variant font-label-caps text-[9px] tracking-widest hover:bg-surface-variant/30 transition-all uppercase">إعادة الكاميرا · Reset Camera</button>
      </div>
    </div>
  </aside>

  <section class="flex-1 h-full relative overflow-hidden">
    <div id="loading" class="absolute inset-0 z-20 flex flex-col items-center justify-center text-primary">
      <span class="material-symbols-outlined text-4xl loading-pulse">deployed_code</span>
      <p class="font-label-caps text-[10px] tracking-widest mt-3 loading-pulse">جاري بناء المشهد…</p>
    </div>
    <canvas id="webgl"></canvas>
    <div class="absolute bottom-3 left-1/2 -translate-x-1/2 z-10 glass-panel rounded-full px-4 py-1.5 pointer-events-none">
      <span class="font-label-caps text-[9px] text-on-surface-variant tracking-widest">اسحب للدوران · drag to orbit · pinch to zoom</span>
    </div>
  </section>
</main>

<footer class="fixed bottom-0 w-full z-50 flex justify-between items-center px-margin-edge py-1 bg-surface/95 backdrop-blur-md border-t border-outline-variant/10 h-8">
  <span class="font-label-caps text-[9px] text-primary tracking-widest">حكاية فرح ديزاين • Three.js 3D</span>
  <div class="flex gap-6">
    <span class="font-label-caps text-[9px] text-on-surface-variant/50" id="statChairs">Chairs: 24</span>
    <span class="font-label-caps text-[9px] text-on-surface-variant/50" id="statStage">Stage: 8.0m</span>
    <span class="font-label-caps text-[9px] text-primary">● Live</span>
  </div>
</footer>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, controls;
let stageGroup, chairGroup, flowerGroup, archGroup, floorMesh, keyLight, ambient;
const state = { tone:'#e6c364', stage:8, chairs:24, flowers:100, light:65, floor:'marble' };

init();
animate();

function init(){
  const canvas = document.getElementById('webgl');
  scene = new THREE.Scene();
  scene.background = new THREE.Color('#0e0e13');
  scene.fog = new THREE.Fog('#0e0e13', 20, 50);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 200);
  camera.position.set(0, 7, 16);

  renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;

  controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 6;
  controls.maxDistance = 32;
  controls.maxPolarAngle = Math.PI/2 - 0.05;
  controls.target.set(0, 2, 0);

  ambient = new THREE.AmbientLight('#ffeccc', 0.5);
  scene.add(ambient);
  keyLight = new THREE.DirectionalLight('#fff2de', 1.4);
  keyLight.position.set(6, 14, 8);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(2048,2048);
  keyLight.shadow.camera.near = 1; keyLight.shadow.camera.far = 50;
  keyLight.shadow.camera.left=-22; keyLight.shadow.camera.right=22;
  keyLight.shadow.camera.top=22; keyLight.shadow.camera.bottom=-22;
  scene.add(keyLight);
  const rim = new THREE.PointLight('#e6c364', 0.6, 40); rim.position.set(-8,6,-6); scene.add(rim);

  buildFloor();
  buildStage();
  buildArch();
  buildFlowers();
  buildSofa();
  buildChairs();

  window.addEventListener('resize', onResize);
  document.getElementById('loading').style.display = 'none';
}

function clearGroup(g){ if(!g) return; while(g.children.length){ const c=g.children.pop(); c.traverse?.(o=>{o.geometry?.dispose?.(); o.material?.dispose?.();}); g.remove(c);} scene.remove(g); }

function buildFloor(){
  if(floorMesh){ scene.remove(floorMesh); floorMesh.geometry.dispose(); floorMesh.material.dispose(); }
  const cfg = { marble:{c:'#b9b4ad',m:0.25,r:0.18}, gold:{c:'#caa64a',m:0.95,r:0.12}, dark:{c:'#15151b',m:0.55,r:0.22} }[state.floor];
  floorMesh = new THREE.Mesh(new THREE.CircleGeometry(24, 64),
    new THREE.MeshStandardMaterial({ color:cfg.c, metalness:cfg.m, roughness:cfg.r }));
  floorMesh.rotation.x = -Math.PI/2;
  floorMesh.receiveShadow = true;
  scene.add(floorMesh);
}

function buildStage(){
  clearGroup(stageGroup);
  stageGroup = new THREE.Group();
  const r = state.stage/2;
  const top = new THREE.Mesh(new THREE.CylinderGeometry(r, r, 0.4, 48),
    new THREE.MeshStandardMaterial({ color:'#f3e9d2', metalness:0.1, roughness:0.5 }));
  top.position.y = 0.2; top.castShadow = top.receiveShadow = true;
  stageGroup.add(top);
  const trim = new THREE.Mesh(new THREE.TorusGeometry(r, 0.06, 12, 64),
    new THREE.MeshStandardMaterial({ color:state.tone, metalness:0.9, roughness:0.2, emissive:state.tone, emissiveIntensity:0.15 }));
  trim.rotation.x = Math.PI/2; trim.position.y = 0.42; stageGroup.add(trim);
  scene.add(stageGroup);
}

function buildArch(){
  clearGroup(archGroup);
  archGroup = new THREE.Group();
  const r = state.stage/2 + 0.4;
  const arch = new THREE.Mesh(new THREE.TorusGeometry(r, 0.14, 16, 80, Math.PI),
    new THREE.MeshStandardMaterial({ color:state.tone, metalness:0.85, roughness:0.25, emissive:state.tone, emissiveIntensity:0.2 }));
  arch.position.set(0, 0.4, -r*0.5);
  arch.castShadow = true;
  archGroup.add(arch);
  scene.add(archGroup);
}

function buildFlowers(){
  clearGroup(flowerGroup);
  flowerGroup = new THREE.Group();
  const count = Math.round((state.flowers/100) * 56);
  const r = state.stage/2 + 0.4;
  const palette = [state.tone, '#ffffff', '#f2c0cf', '#cdeee0'];
  for(let i=0;i<count;i++){
    const t = Math.PI * (i/(count-1||1));
    const f = new THREE.Mesh(new THREE.IcosahedronGeometry(0.15 + Math.random()*0.1, 0),
      new THREE.MeshStandardMaterial({ color: palette[i%palette.length], roughness:0.6, metalness:0.05 }));
    f.position.set(Math.cos(t)*r, 0.4 + Math.sin(t)*r, -r*0.5 + (Math.random()-0.5)*0.3);
    f.castShadow = true;
    flowerGroup.add(f);
  }
  scene.add(flowerGroup);
}

function buildSofa(){
  const sofa = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color:'#f3e5ab', roughness:0.5, metalness:0.1 });
  const seat = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.5, 1), mat); seat.position.set(0,0.65,0); seat.castShadow=true;
  const back = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.1, 0.3), mat); back.position.set(0,1.1,-0.45); back.castShadow=true;
  sofa.add(seat, back);
  sofa.position.set(0, 0.4, 0.2);
  stageGroup.add(sofa);
}

function buildChairs(){
  clearGroup(chairGroup);
  chairGroup = new THREE.Group();
  const n = state.chairs;
  const baseR = state.stage/2 + 2.6;
  let placed = 0, ring = 0;
  while(placed < n && ring < 7){
    const ringR = baseR + ring*1.3;
    const cap = Math.floor(ringR * 2.2);
    const inThis = Math.min(cap, n - placed);
    for(let i=0;i<inThis;i++){
      const a = -Math.PI*0.72 + (Math.PI*1.44) * (inThis>1 ? i/(inThis-1) : 0.5);
      const chair = makeChair();
      chair.position.set(Math.cos(a)*ringR, 0, Math.sin(a)*ringR + 1.2);
      chair.lookAt(0, 0.5, 0);
      chairGroup.add(chair);
    }
    placed += inThis; ring++;
  }
  scene.add(chairGroup);
}

function makeChair(){
  const g = new THREE.Group();
  const m = new THREE.MeshStandardMaterial({ color:state.tone, metalness:0.7, roughness:0.35 });
  const seat = new THREE.Mesh(new THREE.BoxGeometry(0.45,0.08,0.45), m); seat.position.y=0.5; seat.castShadow=true;
  const back = new THREE.Mesh(new THREE.BoxGeometry(0.45,0.5,0.06), m); back.position.set(0,0.75,-0.2); back.castShadow=true;
  g.add(seat, back);
  return g;
}

function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

window.onStage = (v)=>{ state.stage=parseFloat(v); document.getElementById('stageVal').textContent=v+'m'; document.getElementById('statStage').textContent='Stage: '+v+'m'; buildStage(); buildArch(); buildFlowers(); buildSofa(); buildChairs(); };
window.onChairs = (v)=>{ state.chairs=parseInt(v); document.getElementById('chairVal').textContent=v; document.getElementById('statChairs').textContent='Chairs: '+v; buildChairs(); };
window.onFlowers = (v)=>{ state.flowers=parseInt(v); document.getElementById('flowerVal').textContent=v>70?'Full':v>30?'Medium':'Sparse'; buildFlowers(); };
window.onLight = (v)=>{ state.light=parseInt(v); const f=v/65; keyLight.intensity=1.4*f; ambient.intensity=0.5*f; document.getElementById('lightVal').textContent=v>70?'Bright':v>40?'Warm':'Dim'; };
window.onFloor = (v)=>{ state.floor=v; buildFloor(); };
window.setTone = (el,c)=>{ state.tone=c; document.querySelectorAll('.tone-swatch').forEach(s=>s.classList.remove('active')); el.classList.add('active'); buildStage(); buildArch(); buildFlowers(); buildSofa(); buildChairs(); };
window.resetView = ()=>{ camera.position.set(0,7,16); controls.target.set(0,2,0); };
window.randomize = ()=>{
  const tones=['#e6c364','#f2f0ea','#c4748a','#8b7ec8'];
  const c=tones[Math.floor(Math.random()*tones.length)];
  const sw=[...document.querySelectorAll('.tone-swatch')].find(s=>s.dataset.color===c);
  setTone(sw||document.querySelector('.tone-swatch'), c);
  const st=(5+Math.random()*9).toFixed(1); document.getElementById('stageSlider').value=st; onStage(st);
  const ch=Math.round(10+Math.random()*40); document.getElementById('chairSlider').value=ch; onChairs(ch);
};
window.toggleMode = (mode)=>{
  const c=document.getElementById('clientToggle'), a=document.getElementById('adminToggle');
  if(mode==='client'){ c.classList.add('bg-primary','text-on-primary','shadow-sm'); c.classList.remove('text-on-surface-variant'); a.classList.remove('bg-primary','text-on-primary','shadow-sm'); a.classList.add('text-on-surface-variant'); }
  else { a.classList.add('bg-primary','text-on-primary','shadow-sm'); a.classList.remove('text-on-surface-variant'); c.classList.remove('bg-primary','text-on-primary','shadow-sm'); c.classList.add('text-on-surface-variant'); }
};
</script>
</body></html>
